<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Craft CSV Parsing Test</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        h1 { color: #4CAF50; }
        .test-result {
            margin: 2rem 0;
            padding: 1rem;
            border: 1px solid #444;
            border-radius: 8px;
            background: #2a2a2a;
        }
        .success { border-color: #4CAF50; }
        .error { border-color: #f44336; }
        .info { color: #4CAF50; }
        pre {
            background: #1a1a1a;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Small Craft CSV Parsing Test</h1>
    <p>Testing the new small craft CSV format parsing with Heavy_Fighter.csv</p>

    <div id="test-results"></div>

    <script src="csv-parser.js"></script>
    <script>
        const results = document.getElementById('test-results');

        function addResult(title, success, message, details = null) {
            const div = document.createElement('div');
            div.className = `test-result ${success ? 'success' : 'error'}`;
            div.innerHTML = `
                <h3>${success ? '✅' : '❌'} ${title}</h3>
                <p>${message}</p>
                ${details ? `<pre>${details}</pre>` : ''}
            `;
            results.appendChild(div);
        }

        // Test with Heavy_Fighter.csv format
        const heavyFighterCsv = `Name,Heavy Fighter
Hull,90 tons,98.1 MCr

Category,Item,Tons,Cost (MCr)
Hull,Heavily armed and armored fighter.,90,1.9
Armor,bonded_superdense Rating 15,11.25,2.4
Drives,maneuver - Model sW (M-6),16,32.0
,powerPlant - Model sW (P-6),10.5,26.0
,powerPlant - Model sS (P-5),8.1,18.0
Fuel,9.75 tons (504 hours),9.75,0.0
Fittings,Control Cabin (2 crew),6,0.5
,Passenger Cabin (4 passengers),6,0.3
,Airlock,1,0.2
,Fresher,1,0.1
,Galley,0.5,0.1
,Very Advanced Electronics (DM +2),5,4.0
Weapons,Particle Beam Barbette x1 (turret),10,5.5
,Double Beam Laser Turret x1 (turret),1,3.5
,Double Beam Laser Turret x1 (turret),1,3.5
Cargo,Cargo Bay (2 tons),2,0.0
,Ship's Locker (0.6 tons),0.6,0.1
Staff,Pilots: 1,0,0.0
,Gunners: 2,0,0.0
,Engineer: 1,0,0.0
,ECM: 1,0,0.0
,Other: 1,0,0.0
,Total Crew: 6,0,0.0
,,,
TOTALS,Total Mass,89.70,
,Hull Capacity,90,
,Total Cost,,98.1`;

        try {
            // Test 1: Parse with ship name from CSV
            const parsed1 = parseCSV(heavyFighterCsv);

            if (parsed1.shipName === 'Heavy Fighter') {
                addResult('Ship Name from CSV', true,
                    `Ship name correctly extracted: "${parsed1.shipName}"`,
                    `Expected: "Heavy Fighter"\nGot: "${parsed1.shipName}"`);
            } else {
                addResult('Ship Name from CSV', false,
                    `Ship name not extracted correctly`,
                    `Expected: "Heavy Fighter"\nGot: "${parsed1.shipName}"`);
            }

            // Test 2: Check components
            const validComponents = parsed1.components.filter(c => c.tons > 0);
            const hullComponents = parsed1.components.filter(c => c.category.toLowerCase() === 'hull');
            addResult('Component Parsing', true,
                `Parsed ${parsed1.components.length} components (${validComponents.length} with tonnage, ${hullComponents.length} Hull)`,
                `Total Tons: ${parsed1.totalTons}\nTotal Cost: ${parsed1.totalCost} MCr\n\nNote: Hull components found: ${hullComponents.length}\nThese should be filtered out by app.js since the hull IS the ship itself.\n\nFirst few non-Hull components:\n${parsed1.components.filter(c => c.category.toLowerCase() !== 'hull').slice(0, 3).map(c => `- ${c.category}: ${c.item} (${c.tons} tons)`).join('\n')}`);

            // Test 3: Check totals from Hull line
            if (parsed1.totalTons === 90) {
                addResult('Total Tonnage from Hull Line', true,
                    `Total tonnage correctly parsed from Hull line: ${parsed1.totalTons} tons`,
                    `Note: TOTALS lines are ignored for small craft format`);
            } else {
                addResult('Total Tonnage from Hull Line', false,
                    `Total tonnage incorrect`,
                    `Expected: 90 (from "Hull,90 tons,98.1 MCr" line)\nGot: ${parsed1.totalTons}\n\nNote: TOTALS lines should be ignored for small craft format`);
            }

            // Test 3b: Check total cost from Hull line
            if (parsed1.totalCost === 98.1) {
                addResult('Total Cost from Hull Line', true,
                    `Total cost correctly parsed from Hull line: ${parsed1.totalCost} MCr`,
                    `Note: TOTALS lines are ignored for small craft format`);
            } else {
                addResult('Total Cost from Hull Line', false,
                    `Total cost incorrect`,
                    `Expected: 98.1 (from "Hull,90 tons,98.1 MCr" line)\nGot: ${parsed1.totalCost}\n\nNote: TOTALS lines should be ignored for small craft format`);
            }

            // Test 4: Parse with filename fallback
            const parsed2 = parseCSV('Category,Item,Tons,Cost\nEngine,Drive,10,5', 'test_ship.csv');
            if (parsed2.shipName === 'test ship') {
                addResult('Ship Name from Filename', true,
                    `Ship name correctly extracted from filename: "${parsed2.shipName}"`,
                    `Filename: "test_ship.csv"\nExtracted: "${parsed2.shipName}"`);
            } else {
                addResult('Ship Name from Filename', false,
                    `Ship name not extracted from filename`,
                    `Expected: "test ship"\nGot: "${parsed2.shipName}"`);
            }

            // Test 5: Check zero-ton filtering
            const zeroTonComponents = parsed1.components.filter(c => c.tons === 0);
            if (zeroTonComponents.length > 0) {
                addResult('Zero-Ton Items', true,
                    `Note: ${zeroTonComponents.length} zero-ton items included in parse results`,
                    `Zero-ton items (should be filtered by app.js):\n${zeroTonComponents.map(c => `- ${c.category}: ${c.item}`).join('\n')}`);
            }

            // Test 6: Category inheritance
            const driveComponents = parsed1.components.filter(c => c.category === 'Drives');
            if (driveComponents.length === 3) {
                addResult('Category Inheritance', true,
                    `Category inheritance working correctly (3 Drives components found)`,
                    `Drive components:\n${driveComponents.map(c => `- ${c.item} (${c.tons} tons)`).join('\n')}`);
            } else {
                addResult('Category Inheritance', false,
                    `Category inheritance may not be working`,
                    `Expected 3 Drives components, got ${driveComponents.length}`);
            }

        } catch (error) {
            addResult('Parsing Error', false, error.message, error.stack);
        }
    </script>
</body>
</html>
